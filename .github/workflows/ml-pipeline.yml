# .github/workflows/ml-pipeline.yml
name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: README Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Linter Check
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

